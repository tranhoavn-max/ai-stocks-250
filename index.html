<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>US AI Stock Agent</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="shell">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
        <rect x="1.2" y="1.2" width="19.6" height="19.6" fill="#0a0a0a" stroke="#2c2c2c"></rect>
        <line x1="7.5" y1="2" x2="7.5" y2="20" stroke="#2a2a2a" stroke-width=".7"></line>
        <line x1="14.5" y1="2" x2="14.5" y2="20" stroke="#2a2a2a" stroke-width=".7"></line>
        <line x1="2" y1="7.5" x2="20" y2="7.5" stroke="#2a2a2a" stroke-width=".7"></line>
        <line x1="2" y1="14.5" x2="20" y2="14.5" stroke="#2a2a2a" stroke-width=".7"></line>
        <circle cx="7.5" cy="7.5" r="2.8" fill="#ff9e1b"></circle>
        <circle cx="14.5" cy="14.5" r="2.8" fill="#e2e2e2"></circle>
      </svg>
      <span class="name">US AI Stock</span>
    </div>
    <div class="head-right">
      <span class="fresh" id="fresh"><span class="dot"></span><span id="fresh-text">—</span></span>
      <button class="acct-btn" id="acct-btn" data-route="login">LOG IN</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-route="cockpit">Cockpit</button>
    <button data-route="valuation">Valuation</button>
    <button data-route="portfolio">Portfolio <span class="lock">🔒</span></button>
    <button data-route="watchlist">Watchlist <span class="lock">🔒</span></button>
  </nav>

  <main id="view">
    <div class="status-line">Loading…</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
