<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>US AI Stock Agent</title>
  <link rel="preload" href="inter-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="shell">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 26 26" aria-hidden="true">
        <rect x="4" y="4.6" width="19" height="19" rx="5" fill="#141414"></rect>
        <rect x="2.4" y="2.4" width="19" height="19" rx="5" fill="#ffd500" stroke="#141414" stroke-width="2"></rect>
        <rect x="6" y="13.4" width="3" height="4.6" rx="1" fill="#141414"></rect>
        <rect x="9.9" y="10.6" width="3" height="7.4" rx="1" fill="#141414"></rect>
        <rect x="13.8" y="7.4" width="3" height="10.6" rx="1" fill="#141414"></rect>
        <path d="M6.6 12.4 L11.4 8.4 L15.3 10.2" fill="none" stroke="#141414" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
      <span class="name">US EQUITIES</span>
    </div>
    <div class="head-right">
      <span class="fresh" id="fresh" role="status"><span class="dot" aria-hidden="true"></span><span id="fresh-text">—</span></span>
      <div id="header-warnings"></div>
      <button class="acct-btn" id="acct-btn" data-route="login">LOG IN</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-route="cockpit">Cockpit</button>
    <button data-route="valuation">Valuation</button>
    <button data-route="portfolio">Portfolio <span class="lock">🔒</span></button>
    <button data-route="watchlist">Watchlist <span class="lock">🔒</span></button>
  </nav>

  <main id="view">
    <div class="status-line">Loading…</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <!-- Vendored (same-origin, no SRI needed) TradingView Lightweight Charts v4.2.3 -->
  <script src="lightweight-charts.standalone.production.js?v=4.2.3"></script>
  <script src="price-chart.js?v=5"></script>
  <script src="app.js"></script>
</body>
</html>
